<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cek Status Kartu Kuning (AK1)</title>
    <style>
        /* Desain dasar & Layout Desktop/Landscape */
        body { font-family: sans-serif; background: #f0f4f8; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: #ffffff; width: 100%; max-width: 420px; min-height: 100vh; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
        
        @media (min-width: 600px) { 
            .container { min-height: auto; height: auto; border-radius: 12px; margin: 40px 0; padding-bottom: 20px; } 
        }

        /* ----- HALAMAN 1 (FORM INPUT) ----- */
        #halaman-1 { padding: 40px 25px; text-align: center; display: flex; flex-direction: column; flex: 1; justify-content: center; }
        .title-1 { color: #0b3d60; font-size: 22px; font-weight: bold; margin-bottom: 40px; }
        .input-box { width: 100%; box-sizing: border-box; padding: 15px; border: 1px solid #d1d9e6; border-radius: 8px; font-size: 15px; margin-bottom: 20px; outline: none; }
        .input-box:focus { border-color: #0b3d60; }
        .btn-periksa { width: 100%; background: #114a72; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-periksa:active { background: #0b324d; transform: scale(0.98); }
        .copyright { margin-top: auto; color: #94a3b8; font-size: 13px; margin-bottom: 10px; padding-top: 40px; }

        /* ----- HALAMAN 2 (HASIL AK1) ----- */
        #halaman-2 { padding: 30px 20px 40px 20px; text-align: center; display: none; background: #fff; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Ikon Centang Hijau */
        .icon-centang { width: 90px; height: 90px; background-color: #1a8b44; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px auto; border: 4px solid #fff; box-shadow: 0 0 0 2px #1a8b44; }
        .icon-centang::after { content: ''; width: 25px; height: 45px; border: solid white; border-width: 0 8px 8px 0; transform: rotate(45deg); margin-bottom: 12px; }
        
        .title-2 { font-family: 'Times New Roman', Times, serif; font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px;}
        
        /* Tabel Double Border (100% Persis Gambar) */
        .bungkus-tabel { border: 1px solid black; padding: 2px; width: 100%; max-width: 350px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        table, th, td { border: 1px solid black; }
        td { padding: 6px 8px; font-family: 'Times New Roman', Times, serif; font-size: 16px; text-align: left; }
        .col-label { width: 42%; }

        /* QR Code */
        .qr-code { width: 180px; height: 180px; margin: 10px auto 15px auto; display: block; border: 1px solid #ddd; }
        
        /* Teks di bawah QR Code (Sesuai Gambar) */
        .footer-text { font-family: 'Times New Roman', Times, serif; text-align: center; margin-top: 5px; }
        .footer-text-bold { font-size: 17px; font-weight: bold; margin-bottom: 3px; }
        .footer-text-link { font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HALAMAN 1 -->
        <div id="halaman-1">
            <h1 class="title-1">Cek Status Kartu Kuning (AK1)</h1>
            <input type="text" id="inputNomor" class="input-box" placeholder="Masukkan Nomor Pendaftaran (AK1)" autocomplete="off">
            <button id="btnProses" class="btn-periksa" onclick="jalankanCek()">Periksa Status</button>
            <div class="copyright">Copyright © 2026 Kementerian Ketenagakerjaan RI</div>
        </div>

        <!-- HALAMAN 2 -->
        <div id="halaman-2">
            <div class="icon-centang"></div>
            <div class="title-2">KARTU AK1 ASLI</div>
            
            <div class="bungkus-tabel">
                <table>
                    <tr>
                        <td class="col-label">Dicetak pada:</td>
                        <td>: <span id="outDicetak"></span></td>
                    </tr>
                    <tr>
                        <td class="col-label">Berlaku hingga:</td>
                        <td>: <span id="outBerlaku"></span></td>
                    </tr>
                    <tr>
                        <td class="col-label">Status:</td>
                        <td>: <span id="outStatus"></span></td>
                    </tr>
                </table>
            </div>

            <!-- QR Code ditembak langsung ke link yang Mas Joe minta -->
            <img class="qr-code" src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://bursakerja-jatengprov.github.io/publik-cek_ak1-ZjQ3NzQwNzVkYzlhM2ZjYzM0ZGJhNmRjZjE4MGY2ZjhiNWE4OGQ0ZjI0OTlkZWM2MmM3YTM0Zjg3NGY1MTgx-" alt="QR Code">
            
            <!-- Tulisan di bawah barcode diperbaiki biar gak ngumpet -->
            <div class="footer-text">
                <div class="footer-text-bold">BURSA KERJA JATENG E_MAKARYO</div>
                <div class="footer-text-link">http://bursakerja.jatengprov.go.id</div>
            </div>
        </div>
    </div>

    <script>
        // MASUKIN LINK DEPLOY DARI GOOGLE SCRIPT KE SINI!
        const URL_GAS = "https://script.google.com/macros/s/AKfycbwVAVG9Whpkf_q1WHedbJNqtessm0QexXFLFIIAFS558NT8gUtclp691jpM5CXX5pP6cA/exec";

        function jalankanCek() {
            const noInput = document.getElementById('inputNomor').value.trim();
            const tombol = document.getElementById('btnProses');

            if (noInput === "") {
                alert("Nomor Pendaftaran nggak boleh kosong!");
                return;
            }

            tombol.innerHTML = "Memeriksa...";
            tombol.disabled = true;

            fetch(URL_GAS + "?nomor=" + encodeURIComponent(noInput))
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        document.getElementById('outDicetak').innerText = data.data.dicetak;
                        document.getElementById('outBerlaku').innerText = data.data.berlaku;
                        
                        document.getElementById('outStatus').innerHTML = data.data.status.replace("Admin Kabupaten", "Admin<br>Kabupaten");

                        document.getElementById('halaman-1').style.display = 'none';
                        document.getElementById('halaman-2').style.display = 'flex';
                    } else {
                        alert("Gagal terhubung ke database.");
                    }
                })
                .catch(error => {
                    alert("Koneksi bermasalah nih. Coba lagi.");
                })
                .finally(() => {
                    tombol.innerHTML = "Periksa Status";
                    tombol.disabled = false;
                });
        }
    </script>
</body>
</html>
